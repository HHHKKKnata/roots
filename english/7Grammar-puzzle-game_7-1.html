<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quest - Page 10 Part 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #eef1f1;
            --theme-color: #9bb3b1;
            --card-bg: #cbdad8;
            --text-color: #2c3e3b;
            --accent-color: #e26d5c;
            --transition-speed: 0.5s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .header-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .status-container {
            display: flex;
            gap: 15px;
            font-weight: 700;
        }

        .hearts {
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        /* Minimap Component */
        .minimap-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 10px 20px;
            margin: 10px 0;
        }
        .minimap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 30px;
            position: relative;
        }
        .minimap::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            z-index: 1;
            transform: translateY(-50%);
        }
        .map-node {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            z-index: 2;
            transition: all 0.4s ease;
            position: relative;
        }
        .map-node.active {
            border-color: var(--theme-color);
            background: var(--card-bg);
            transform: scale(1.1);
        }
        .map-node.clear {
            background: var(--theme-color);
            border-color: var(--theme-color);
            color: white;
        }
        .avatar-marker {
            position: absolute;
            font-size: 1.2rem;
            top: -25px;
            transition: left 0.5s ease-in-out;
            z-index: 3;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .game-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            border: 2px solid var(--card-bg);
            transition: border-color var(--transition-speed) ease;
        }

        .instruction {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .question-box {
            background: var(--bg-color);
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--theme-color);
        }

        .sub-hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: -10px;
            margin-bottom: 15px;
        }

        /* Puzzle Pool Styles */
        .pool-zone, .ans-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            min-height: 60px;
            padding: 10px;
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px dashed rgba(0,0,0,0.05);
        }

        .ans-zone {
            background: rgba(255,255,255,0.8);
            border: 2px solid var(--theme-color);
        }

        .letter-card, .word-card {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s, box-shadow 0.1s;
        }

        .letter-card:active, .word-card:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.1);
        }

        /* Choices for Area 2 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: #ffffff;
            border: 2px solid var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
        }

        .choice-btn:hover {
            background: var(--bg-color);
            border-color: var(--theme-color);
        }

        /* Control UI Buttons */
        .control-btns {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            text-align: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15);
        }

        .btn-submit {
            background-color: var(--theme-color);
            color: #ffffff;
        }
        .btn-submit:hover { opacity: 0.9; }

        .btn-reset {
            background-color: #d1d5db;
            color: #374151;
        }

        /* Dynamic Persistent Advice Box */
        .advice-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #fff5f5;
            border-left: 4px solid var(--accent-color);
            font-size: 0.9rem;
            font-weight: 700;
            display: none;
            line-height: 1.4;
        }

        /* Shatter Animation Design for Misses */
        .shatter {
            animation: shatterAnim 0.6s forwards ease-in;
            pointer-events: none;
        }

        @keyframes shatterAnim {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: translateY(40px) scale(0.8) rotate(15deg); opacity: 0.6; }
            100% { transform: translateY(150px) scale(0) rotate(-30deg); opacity: 0; }
        }

        /* Curtain Shutter System */
        .curtain-overlay {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 50%;
            background: var(--theme-color);
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #curtain-left { left: 0; transform: translateX(-100%); }
        #curtain-right { right: 0; transform: translateX(100%); }
        
        body.curtain-closed #curtain-left { transform: translateX(0); }
        body.curtain-closed #curtain-right { transform: translateX(0); }

        /* Shake Framework */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 4px); }
            20%, 40%, 60%, 80% { transform: translate(8px, -4px); }
        }
        .shake-active {
            animation: shake 0.4s infinite;
        }

        /* Warning Dynamic Sign */
        .warning-banner {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ef4444;
            font-size: 1.8rem;
            font-weight: 700;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 20px;
        }
        .warning-banner.show {
            visibility: visible;
            opacity: 1;
        }
        .warning-text {
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); }
            100% { transform: scale(1.1); }
        }

        /* Absolute Game Over Screen */
        .gameover-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #131417;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .gameover-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .gameover-title {
            color: #ef4444;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .btn-retry {
            background: #ef4444;
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239,68,68,0.4);
            font-weight: 700;
        }

        /* Grand Win Presentation UI */
        .win-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #e6be7e;
            z-index: 250;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
            color: #4a3718;
            text-align: center;
            padding: 20px;
        }
        .win-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .win-file-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: rgba(255,255,255,0.4);
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
        }
        .win-main-text {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">English Quest</div>
        <div class="status-container">
            <div>Q: <span id="current-q-num">1</span>/10</div>
            <div class="hearts" id="hearts-layer">❤️❤️❤️</div>
        </div>
    </header>

    <!-- Mini Progress Map Components -->
    <div class="minimap-wrapper">
        <div class="minimap">
            <div class="avatar-marker" id="avatar-run">🏃‍♂️</div>
            <div class="map-node" id="node-1">●</div>
            <div class="map-node" id="node-2">●</div>
            <div class="map-node" id="node-3">👹</div>
        </div>
    </div>

    <main>
        <div class="game-card" id="main-stage-card">
            <div class="instruction" id="current-instruction">指示文をロード中...</div>
            
            <div class="question-box" id="current-question">問題文をロード中...</div>
            <div class="sub-hint" id="current-sub-hint"></div>

            <!-- Puzzle Interactive Slots -->
            <div id="puzzle-interaction-zone">
                <div class="ans-zone" id="answer-slots"></div>
                <div class="pool-zone" id="pool-slots"></div>
            </div>

            <!-- Area 2 Multiple Choices Selection Slots -->
            <div class="choices-container" id="choices-slots" style="display: none;"></div>

            <!-- System Controllers -->
            <div class="control-btns">
                <button class="btn btn-reset" id="action-reset-btn">リセット (RESET)</button>
                <button class="btn btn-submit" id="action-submit-btn">決定 (SUBMIT)</button>
            </div>

            <!-- Persistent Advisory Box -->
            <div class="advice-box" id="live-advice-feed"></div>
        </div>
    </main>

    <!-- Curtains System -->
    <div class="curtain-overlay" id="curtain-left"></div>
    <div class="curtain-overlay" id="curtain-right"></div>

    <!-- Alert Screen -->
    <div class="warning-banner" id="boss-alert-screen">
        <div class="warning-text">⚠️ WARNING!! BOSS APPROACHING ⚠️<br><br>エリア3：ボスバトル突入！</div>
    </div>

    <!-- Defeat / Game Over View Layer -->
    <div class="gameover-overlay" id="fail-view-layer">
        <div class="gameover-title">GAME OVER</div>
        <button class="btn-retry" onclick="location.reload()">Play Again</button>
    </div>

    <!-- Victory View Layer -->
    <div class="win-overlay" id="victory-view-layer">
        <div class="win-file-title" id="url-identity-field">STAGE CLEAR!!</div>
        <div class="win-main-text">You nailed it! 🎉</div>
        <p style="font-weight: bold; font-size:1.1rem;">すべてのエリアを完全クリア！</p>
        <button class="btn-retry" style="background:#4a3718; color:white; margin-top:30px; box-shadow:none;" onclick="location.reload()">もう一度遊ぶ</button>
    </div>

    <script>
        // Database Matrix Formulation
        const dataset = [
            // Area 1: New words spell puzzle (Q1 - Q4)
            { type: 'spell', word: 'golden', hint: '「金色の、すばらしい」のスペルを完成させなさい。' },
            { type: 'spell', word: 'holiday', hint: '「祝日、休日」のスペルを完成させなさい。' },
            { type: 'spell', word: 'flight', hint: '「定期航空便、フライト」のスペルを完成させなさい。' },
            { type: 'spell', word: 'airport', hint: '「空港」のスペルを完成させなさい。' },
            
            // Area 2: Re-written Text Contextual Reading & Choice Matrix (Q5 - Q7)
            { 
                type: 'choice', 
                q: 'When does the "Golden Week" vacation begin for the speakers?', 
                hint: 'リライト文：The long vacation starts tomorrow. I am leaving for Singapore tomorrow morning.',
                choices: ['Today', 'Tomorrow morning', 'Tomorrow', 'This Saturday'], 
                ans: 'Tomorrow',
                advice: '本文の文頭付近にある「starts tomorrow（明日始まる）」という記述に直接注目してください。'
            },
            { 
                type: 'choice', 
                q: 'What is the speaker planned to do at 5 p.m.?', 
                hint: 'リライト文：My flight arrives in Singapore at 5 p.m. Where are we going to meet in the airport?',
                choices: ['Meet friends', 'Arrive in Singapore', 'Have lunch', 'Leave for the city'], 
                ans: 'Arrive in Singapore',
                advice: '午後5時（at 5 p.m.）の直前にある動詞「arrives（到着する）」の意味を読み取りましょう。'
            },
            { 
                type: 'choice', 
                q: 'What will Nagisa and Kento do for the speaker in Singapore?', 
                hint: 'リライト文：You are going to show me around the city, right? I can’t wait!',
                choices: ['Show the speaker around the city', 'Have lunch during the flight', 'Visit a famous park', 'Buy a guidebook'], 
                ans: 'Show the speaker around the city',
                advice: '「show [人] around 〜」で「（人）に〜を案内する」という文脈上の意味の塊を探しましょう。'
            },

            // Area 3: Grammar Target "be going to" Syntax Matrix (Q8 - Q10)
            {
                type: 'arrange',
                sentence: ['I', 'am', 'going', 'to', 'have', 'lunch', 'during', 'the', 'flight'],
                display: '私は飛行機の中で昼食を食べる予定です。',
                advice: '未来の予定を表す表現は〈am going to + 動詞の原形〉の正しい語順に並べる必要があります。'
            },
            {
                type: 'arrange',
                sentence: ['Are', 'you', 'going', 'to', 'visit', 'a', 'famous', 'park'],
                display: 'あなたは有名な公園を訪れるつもりですか。',
                advice: '「be going to」の疑問文は、Be動詞（Are）を主語（you）の前に配置することから始めます。'
            },
            {
                type: 'arrange',
                sentence: ['We', 'are', 'going', 'to', 'meet', 'in', 'the', 'airport'],
                display: '私たちは空港で会う予定です。',
                advice: '主語が複数のWeなので、対応するBe動詞「are」を選択し、その後ろに「going to + 動詞の原形」を繋げます。'
            }
        ];

        // System Constants Initialization
        let currentIndex = 0;
        let lives = 3;
        let selectedItems = [];
        let poolItems = [];
        let audioCtx = null;

        // Sound Synthesis Subsystem
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.setValueAtTime(120, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Color Theme Controller
        function adaptTheme(index) {
            const body = document.body;
            if (index < 4) {
                // Area 1
                body.style.setProperty('--bg-color', '#eef1f1');
                body.style.setProperty('--theme-color', '#9bb3b1');
                body.style.setProperty('--card-bg', '#cbdad8');
                body.style.setProperty('--text-color', '#2c3e3b');
                document.getElementById('node-1').className = 'map-node active';
                document.getElementById('node-2').className = 'map-node';
                document.getElementById('node-3').className = 'map-node';
                document.getElementById('avatar-run').style.left = '10px';
            } else if (index < 7) {
                // Area 2
                body.style.setProperty('--bg-color', '#edeaf4');
                body.style.setProperty('--theme-color', '#b9b2da');
                body.style.setProperty('--card-bg', '#d5d1ea');
                body.style.setProperty('--text-color', '#322c4a');
                document.getElementById('node-1').className = 'map-node clear';
                document.getElementById('node-2').className = 'map-node active';
                document.getElementById('node-3').className = 'map-node';
                document.getElementById('avatar-run').style.left = '46%';
            } else {
                // Area 3
                body.style.setProperty('--bg-color', '#f5ecef');
                body.style.setProperty('--theme-color', '#d2a0a6');
                body.style.setProperty('--card-bg', '#e7cbd0');
                body.style.setProperty('--text-color', '#4a2c30');
                document.getElementById('node-1').className = 'map-node clear';
                document.getElementById('node-2').className = 'map-node clear';
                document.getElementById('node-3').className = 'map-node active';
                document.getElementById('avatar-run').style.left = '90%';
            }
        }

        // Random Character & Word Shuffle Utility
        function knuthShuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Engine Display Rendering Setup
        function constructQuestion() {
            adaptTheme(currentIndex);
            document.getElementById('current-q-num').innerText = currentIndex + 1;
            document.getElementById('live-advice-feed').style.display = 'none';
            
            const item = dataset[currentIndex];
            selectedItems = [];

            // UI Mode Distinctions
            if (item.type === 'spell' || item.type === 'arrange') {
                document.getElementById('puzzle-interaction-zone').style.display = 'block';
                document.getElementById('choices-slots').style.display = 'none';
                document.getElementById('action-submit-btn').style.display = 'inline-block';
                document.getElementById('action-reset-btn').style.display = 'inline-block';
                
                if (item.type === 'spell') {
                    document.getElementById('current-instruction').innerText = '正しいスペルになるように文字カードを並び替えなさい。';
                    document.getElementById('current-question').innerText = item.hint;
                    document.getElementById('current-sub-hint').innerText = '※使わない文字カードも余分に混ざっています';
                    
                    // Generate alphabet letters + 3 dummy cards
                    let letters = item.word.split('');
                    const poolSource = 'abcdefghijklmnopqrstuvwxyz';
                    let dummies = 0;
                    while (dummies < 3) {
                        let candidate = poolSource[Math.floor(Math.random() * 26)];
                        if (!item.word.includes(candidate)) {
                            letters.push(candidate);
                            dummies++;
                        }
                    }
                    poolItems = knuthShuffle([...letters]);
                } else {
                    document.getElementById('current-instruction').innerText = '正しい語順になるように単語カードを並び替えなさい。';
                    document.getElementById('current-question').innerText = item.display;
                    document.getElementById('current-sub-hint').innerText = '';
                    poolItems = knuthShuffle([...item.sentence]);
                }
                renderPuzzleZones();
            } else if (item.type === 'choice') {
                document.getElementById('puzzle-interaction-zone').style.display = 'none';
                document.getElementById('choices-slots').style.display = 'flex';
                document.getElementById('action-submit-btn').style.display = 'none';
                document.getElementById('action-reset-btn').style.display = 'none';

                document.getElementById('current-instruction').innerText = '適切なものを選択肢から選びなさい。';
                document.getElementById('current-question').innerText = item.q;
                document.getElementById('current-sub-hint').innerText = item.hint;
                
                const container = document.getElementById('choices-slots');
                container.innerHTML = '';
                item.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = choice;
                    btn.onclick = () => registerChoice(choice);
                    container.appendChild(btn);
                });
            }
        }

        function renderPuzzleZones() {
            const ansZone = document.getElementById('answer-slots');
            const poolZone = document.getElementById('pool-slots');
            ansZone.innerHTML = '';
            poolZone.innerHTML = '';

            selectedItems.forEach((val, idx) => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.innerText = val;
                card.onclick = () => removeElement(idx);
                ansZone.appendChild(card);
            });

            poolItems.forEach((val, idx) => {
                if (val !== null) {
                    const card = document.createElement('div');
                    card.className = 'letter-card';
                    card.innerText = val;
                    card.onclick = () => selectElement(idx);
                    poolZone.appendChild(card);
                }
            });
        }

        function selectElement(idx) {
            selectedItems.push(poolItems[idx]);
            poolItems[idx] = null;
            renderPuzzleZones();
        }

        function removeElement(idx) {
            const val = selectedItems[idx];
            selectedItems.splice(idx, 1);
            const emptyIdx = poolItems.indexOf(null);
            if (emptyIdx !== -1) {
                poolItems[emptyIdx] = val;
            } else {
                poolItems.push(val);
            }
            renderPuzzleZones();
        }

        document.getElementById('action-reset-btn').onclick = () => {
            const item = dataset[currentIndex];
            if (item.type === 'spell') {
                constructQuestion();
            } else if (item.type === 'arrange') {
                selectedItems = [];
                poolItems = knuthShuffle([...item.sentence]);
                renderPuzzleZones();
            }
        };

        // Verification Rule Execution Logic
        document.getElementById('action-submit-btn').onclick = () => {
            const item = dataset[currentIndex];
            let answerString = '';
            let correctString = '';

            if (item.type === 'spell') {
                answerString = selectedItems.join('');
                correctString = item.word;
            } else if (item.type === 'arrange') {
                answerString = selectedItems.join(' ');
                correctString = item.sentence.join(' ');
            }

            if (answerString === correctString) {
                handleSuccess();
            } else {
                handleFailure(item.advice || 'スペルや並び順をもう一度確認してみましょう。');
            }
        };

        function registerChoice(chosenValue) {
            const item = dataset[currentIndex];
            if (chosenValue === item.ans) {
                handleSuccess();
            } else {
                handleFailure(item.advice);
            }
        }

        // Response Execution Routines
        function handleSuccess() {
            playSound('correct');
            if (currentIndex === 3) {
                // Curtain shutter transition from Area 1 to 2
                document.body.classList.add('curtain-closed');
                setTimeout(() => {
                    currentIndex++;
                    constructQuestion();
                    document.body.classList.remove('curtain-closed');
                }, 600);
            } else if (currentIndex === 6) {
                // Precision 2-second wait then shake transition from Area 2 to 3
                currentIndex++;
                setTimeout(() => {
                    const banner = document.getElementById('boss-alert-screen');
                    document.body.classList.add('shake-active');
                    banner.classList.add('show');
                    playSound('wrong'); // Produce dynamic dramatic feedback audio
                    
                    setTimeout(() => {
                        document.body.classList.remove('shake-active');
                        banner.classList.remove('show');
                        constructQuestion();
                    }, 2500);
                }, 2000);
            } else if (currentIndex < dataset.length - 1) {
                currentIndex++;
                constructQuestion();
            } else {
                triggerVictorySequence();
            }
        }

        function handleFailure(adviceMessage) {
            playSound('wrong');
            lives--;
            updateHeartsUI();

            // Run structural shatter drop animation on answer blocks
            const blocks = document.querySelectorAll('#answer-slots .letter-card');
            blocks.forEach(b => b.classList.add('shatter'));

            // Persistence constraint preservation
            const adviceBox = document.getElementById('live-advice-feed');
            adviceBox.innerText = `💡 アドバイス: ${adviceMessage}`;
            adviceBox.style.display = 'block';

            setTimeout(() => {
                if (lives <= 0) {
                    document.getElementById('fail-view-layer').classList.add('show');
                } else {
                    const item = dataset[currentIndex];
                    if (item.type === 'spell') {
                        constructQuestion();
                    } else if (item.type === 'arrange') {
                        selectedItems = [];
                        poolItems = knuthShuffle([...item.sentence]);
                        renderPuzzleZones();
                    }
                    // Restore advice visibility after slot refresh
                    adviceBox.style.display = 'block';
                }
            }, 600);
        }

        function updateHeartsUI() {
            const container = document.getElementById('hearts-layer');
            container.innerText = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
        }

        // Clean Architecture Victory Sequences
        function triggerVictorySequence() {
            document.body.style.setProperty('--bg-color', '#e6be7e');
            
            // Clean extraction of runtime target context path names
            let currentPath = window.location.pathname;
            let filename = currentPath.substring(currentPath.lastIndexOf('/') + 1);
            filename = filename.replace('.html', '');
            if (!filename || filename === '') filename = 'EnglishQuest_Stage';
            
            document.getElementById('url-identity-field').innerText = `${decodeURIComponent(filename).toUpperCase()} CLEAR!!`;
            document.getElementById('victory-view-layer').classList.add('show');

            // Generate particles
            for (let i = 0; i < 60; i++) {
                createParticle();
            }
        }

        function createParticle() {
            const emojis = ['🎉', '✨', '🌟', '👑', '🔥', '💎'];
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = -20 + 'px';
            p.style.fontSize = Math.random() * 20 + 16 + 'px';
            p.style.animationDuration = Math.random() * 2 + 2 + 's';
            p.style.animationDelay = Math.random() * 1 + 's';
            document.getElementById('victory-view-layer').appendChild(p);
        }

        // Safe Initialization Bootstrap
        window.onload = () => {
            constructQuestion();
        };
    </script>
</body>
</html>
