<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Poetry - English Spelling Puzzle</title>
    <style>
        /* ==========================================================================
           1. カラーパレット・デザインシステム定義
           ========================================================================== */
        :root {
            --bg-color: #f4f0ea;      /* 画面全体の背景色（温かみのある生成り色） */
            --card-bg: #ffffff;       /* 各パネルの背景色 */
            --text-main: #1a1a1a;     /* メインの文字色 */
            --text-muted: #757575;    /* 補足用・ラベル用の薄い文字色 */
            --border-color: #1a1a1a;  /* 外枠・ボーダーの黒色 */
            --accent-red: #d9383a;    /* ミスカウント・エラー用の赤色 */
            --accent-green: #2e7d32;  /* クリア画面用の緑色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent; /* スマホタップ時の青いハイライトを無効化 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ヘッダーデザイン */
        header {
            width: 100%;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area h1 {
            font-size: 1.4rem;
            letter-spacing: 1px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--border-color);
            padding: 2px 8px;
            border-radius: 12px;
            background: var(--card-bg);
        }

        /* ==========================================================================
           2. レイアウト（スマートフォン・縦スクロール専用）
           ========================================================================== */
        main {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 共通パネルスタイル */
        .panel {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 3px 3px 0px var(--border-color);
        }

        /* パネル上部のラベル枠 */
        .panel-title {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 4px;
            margin-bottom: 8px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 日本語意味の表示エリア */
        .jp-meaning {
            font-size: 1rem;
            font-weight: bold;
            background: #fdfaf2;
            padding: 8px 10px;
            border-radius: 4px;
            border-left: 4px solid var(--border-color);
            line-height: 1.3;
        }

        /* ミスに応じて出現する音声アシストエリア */
        .assist-area {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* 共通ボタンデザイン */
        .btn {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--border-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 0.8rem;
        }

        .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--border-color);
        }

        .btn-danger { color: var(--accent-red); }
        .btn-success { background: var(--text-main); color: #fff; }

        /* ==========================================================================
           3. パズルピース ＆ 回答エリア
           ========================================================================== */
        /* WORD_POOL コンテナ */
        .piece-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-content: flex-start;
        }

        /* アルファベットカード（ピース）の基本設定 */
        .piece {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            box-shadow: 2px 2px 0px var(--border-color);
            touch-action: manipulation;
        }

        /* 特殊文字（スペースや記号）用ピースのスタイル */
        .piece.special {
            background: rgba(0, 0, 0, 0.05);
            border-style: dashed;
            color: var(--text-muted);
        }

        /* final_result 回答ゾーン */
        .answer-zone {
            border: 2px dashed #ccc;
            background: #fafafa;
            border-radius: 4px;
            min-height: 42px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px;
            align-content: flex-start;
            margin-bottom: 10px;
            position: relative;
        }

        /* 不正解時の演出：ガタガタ揺れる */
        .shatter-shake {
            animation: shake 0.4s ease-in-out infinite;
        }

        /* 不正解時の演出：文字が下に崩落する */
        .shatter .piece {
            animation: fall 0.6s forwards ease-in;
            pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100px) rotate(20deg); opacity: 0; }
        }

        .action-row {
            display: flex;
            gap: 8px;
        }
        .action-row .btn { flex: 1; padding: 10px; font-size: 0.9rem; }

        /* ==========================================================================
           4. 全画面オーバーレイ（ゲームオーバー・全クリア画面）
           ========================================================================== */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 240, 234, 0.98);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
        }

        .overlay.active { display: flex; }

        .overlay-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 16px;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .overlay-title.clear {
            color: var(--accent-green);
            font-size: 3.5rem;
        }
        .overlay-title.gameover { color: var(--accent-red); font-size: 3rem; }

        .overlay-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>7-1 ALL53 words</h1>
        </div>
        <div class="status-badge" id="stage-counter">STAGE 1 / --</div>
    </header>

    <main>
        <section class="panel">
            <div class="panel-title">
                <span>Problem Info</span>
                <span id="miss-counter" style="color: var(--accent-red); font-weight: bold;">MISS: 0 / 3</span>
            </div>
            <div class="jp-meaning" id="question-meaning">読み込み中...</div>
            
            <div class="assist-area" id="assist-box"></div>
        </section>

        <section class="panel">
            <div class="panel-title">WORD_POOL</div>
            <div class="piece-container" id="pool-zone"></div>
        </section>

        <section class="panel">
            <div class="panel-title">final_result</div>
            <div class="answer-zone" id="answer-zone"></div>
            
            <div class="action-row">
                <button class="btn btn-danger" id="btn-reset">RESET</button>
                <button class="btn btn-success" id="btn-submit">SUBMIT</button>
            </div>
        </section>
    </main>

    <div class="overlay" id="end-overlay">
        <div class="overlay-title" id="overlay-msg"></div>
        <div class="overlay-meta" id="overlay-sub"></div>
        <button class="btn" id="btn-restart" style="padding: 12px 24px; font-size: 1rem; width: auto; min-width: 160px;">PLAY AGAIN</button>
    </div>

    <script>
        /* ==========================================================================
           5. 出題英単語 データベース定義（10ページ 〜 15ページ全収録）
           ========================================================================== */
        const wordData = [
            // --- 10ページ ---
            { word: "golden", meaning: "金色の、すばらしい", roma: "ゴールデン" },
            { word: "holiday", meaning: "休日、祝日（単数形）", roma: "ホリデイ" },
            { word: "holidays", meaning: "休日、祝日（複数形）", roma: "ホリデイズ" },
            { word: "Singapore", meaning: "シンガポール（地名）", roma: "シンガポール" },
            { word: "flight", meaning: "定期航空便、フライト", roma: "フライト" },
            { word: "arrive", meaning: "到着する", roma: "アライヴ" },
            { word: "arrives", meaning: "到着する（三人称単数現在形）", roma: "アライヴズ" },
            { word: "airport", meaning: "空港", roma: "エアポート" },
            { word: "soon", meaning: "まもなく、すぐに", roma: "スーン" },
            { word: "Daniel", meaning: "ダニエル [名詞・人名]", roma: "ダニエル" },
            { word: "the “Golden Week” holidays", meaning: "ゴールデンウィーク", roma: "ザ ゴールデン ウィーク ホリデイズ" },
            { word: "See you.", meaning: "またね。 / さようなら。", roma: "シー ユー" },
            
            // --- 11ページ ---
            { word: "will", meaning: "…するつもりです、…でしょう [助動詞・未来や意志を表す]", roma: "ウィル" },
            { word: "excited", meaning: "ワクワクした、興奮した", roma: "イクサイティッド" },
            { word: "seafood", meaning: "シーフード、海産食品", roma: "シーフード" },
            { word: "reservation", meaning: "予約", roma: "レザヴェイション" },
            { word: "Merlion Park", meaning: "マーライオン公園", roma: "マーライオン パーク" },
            { word: "the Merlion", meaning: "マーライオン", roma: "ザ マーライオン" },
            { word: "you’ll", meaning: "you will の短縮形", roma: "ユール" },
            { word: "I’ll", meaning: "I will の短縮形", roma: "アイル" },
            
            // --- 13ページ ---
            { word: "meter", meaning: "メートル [長さの単位・単数形]", roma: "メーター" },
            { word: "meters", meaning: "メートル [長さの単位・複数形]", roma: "メーターズ" },
            { word: "tall", meaning: "（身長や建物の高さが）高い", roma: "トール" },
            { word: "weigh", meaning: "重さがある、体重がある", roma: "ウェイ" },
            { word: "weighs", meaning: "重さがある、体重がある（三人称単数現在形）", roma: "ウェイズ" },
            { word: "ton", meaning: "トン [重さの単位・単数形]", roma: "トン" },
            { word: "tons", meaning: "トン [重さの単位・複数形]", roma: "トンズ" },
            { word: "found", meaning: "find（見つける、気づく）の過去形", roma: "ファウンド" },
            { word: "language", meaning: "言語（単数形）", roma: "ラングウィッジ" },
            { word: "languages", meaning: "言語（複数形）", roma: "ラングウィッジズ" },
            { word: "dollar", meaning: "ドル [通貨単位・単数形]", roma: "ダラー" },
            { word: "dollars", meaning: "ドル [通貨単位・複数形]", roma: "ダラーズ" },
            { word: "example", meaning: "例、手本", roma: "イクザンプル" },
            { word: "communicate", meaning: "意思を通じ合わせる、連絡をとる", roma: "コミュニュケイト" },
            { word: "Malay", meaning: "マレー語", roma: "マレイ" },
            { word: "Tamil", meaning: "タミル語", roma: "タミル" },
            { word: "for example", meaning: "例えば", roma: "フォー イクザンプル" },
            
            // --- 15ページ ---
            { word: "painting", meaning: "絵、絵画（単数形）", roma: "ペインティング" },
            { word: "paintings", meaning: "絵、絵画（複数形）", roma: "ペインティングス" },
            { word: "wall", meaning: "壁（単数形）", roma: "ウォール" },
            { word: "walls", meaning: "壁（複数形）", roma: "ウォールズ" },
            { word: "surprised", meaning: "驚いた", roma: "サプライズド" },
            { word: "area", meaning: "地域、区域、場所", roma: "エリア" },
            { word: "India", meaning: "インド（国名）", roma: "インディア" },
            { word: "mosque", meaning: "モスク [回教寺院]", roma: "モスク" },
            { word: "culture", meaning: "文化（単数形）", roma: "カルチャー" },
            { word: "cultures", meaning: "文化（複数形）", roma: "カルチャーズ" },
            { word: "Chinatown", meaning: "チャイナタウン（中華街）", roma: "チャイナタウン" },
            { word: "Detective Conan", meaning: "名探偵コナン", roma: "ディテクティブ コナン" },
            { word: "Hindu", meaning: "ヒンドゥー教（の）", roma: "ヒンドゥー" },
            { word: "Little India", meaning: "リトル・インディア", roma: "リトル インディア" },
            { word: "Arab Street", meaning: "アラブ・ストリート", roma: "アラブ ストリート" },
            { word: "onion-shaped", meaning: "タマネギ型の", roma: "オニオン シェイプド" }
        ];

        // --- 内部システム管理用の変数群 ---
        let shuffledStages = []; 
        let currentStageIdx = 0; 
        let currentMissCount = 0; 
        let audioCtx = null;     

        // --- DOM要素のキャッシュ ---
        const stageCounter = document.getElementById('stage-counter');
        const missCounter = document.getElementById('miss-counter');
        const questionMeaning = document.getElementById('question-meaning');
        const poolZone = document.getElementById('pool-zone');
        const answerZone = document.getElementById('answer-zone');
        const assistBox = document.getElementById('assist-box');
        const endOverlay = document.getElementById('end-overlay');
        const overlayMsg = document.getElementById('overlay-msg');
        const overlaySub = document.getElementById('overlay-sub');

        // ==========================================================================
        // 6. 音響システム (Web Audio API)
        // ==========================================================================
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); // E5
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(293.66, audioCtx.currentTime); // D4
                osc.frequency.setValueAtTime(146.83, audioCtx.currentTime + 0.12); // D3
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // ==========================================================================
        // 7. 音声合成システム (iOS英語固定対策を含む)
        // ==========================================================================
        function playUSVoice(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                u.rate = 0.8; 
                
                const voices = window.speechSynthesis.getVoices();
                const enVoice = voices.find(v => v.lang.startsWith('en-') || v.lang.includes('US'));
                if (enVoice) u.voice = enVoice;
                
                window.speechSynthesis.speak(u);
            }
        }

        function playRomaVoice(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ja-JP';
                u.rate = 0.85;
                window.speechSynthesis.speak(u);
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        // ==========================================================================
        // 8. パズルロジック & イベント制御
        // ==========================================================================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            shuffledStages = shuffleArray([...wordData]); 
            currentStageIdx = 0;
            endOverlay.classList.remove('active'); 
            loadStage(currentStageIdx);
        }

        function loadStage(idx) {
            currentMissCount = 0;
            updateStatusHeaders();
            assistBox.innerHTML = ''; 

            const currentData = shuffledStages[idx];
            questionMeaning.textContent = currentData.meaning;

            answerZone.innerHTML = '';
            answerZone.classList.remove('shatter-shake', 'shatter');
            poolZone.innerHTML = '';

            const chars = currentData.word.split('');
            const piecesData = chars.map((char, index) => {
                const isSpecial = /[^a-zA-Z0-9]/.test(char);
                return { id: `char-${index}`, char: char, isSpecial: isSpecial };
            });

            const shuffledPieces = shuffleArray([...piecesData]);

            shuffledPieces.forEach(p => {
                const el = document.createElement('div');
                el.classList.add('piece');
                if (p.isSpecial) el.classList.add('special');
                
                el.textContent = p.char === ' ' ? '␣' : p.char;
                el.dataset.id = p.id;
                el.dataset.realChar = p.char; 
                
                const handler = (e) => {
                    e.preventDefault(); 
                    handlePieceAction(el);
                };
                el.addEventListener('touchstart', handler, { passive: false });
                el.addEventListener('click', handler);

                poolZone.appendChild(el);
            });
        }

        function updateStatusHeaders() {
            stageCounter.textContent = `STAGE ${currentStageIdx + 1} / ${shuffledStages.length}`;
            missCounter.textContent = `MISS: ${currentMissCount} / 3`;
        }

        function handlePieceAction(pieceEl) {
            if (answerZone.classList.contains('shatter')) return;
            initAudio();

            if (pieceEl.parentElement === poolZone) {
                answerZone.appendChild(pieceEl); 
            } else {
                poolZone.appendChild(pieceEl);   
            }
        }

        function updateAssistButtons() {
            assistBox.innerHTML = '';
            const currentData = shuffledStages[currentStageIdx];

            if (currentMissCount >= 1) {
                const btnUS = document.createElement('button');
                btnUS.className = 'btn';
                btnUS.innerHTML = '🔊 単語発音 (US)';
                
                const handler = (e) => { e.preventDefault(); playUSVoice(currentData.word); };
                btnUS.addEventListener('touchstart', handler, { passive: false });
                btnUS.addEventListener('click', handler);
                
                assistBox.appendChild(btnUS);
            }
            if (currentMissCount >= 2) {
                const btnRoma = document.createElement('button');
                btnRoma.className = 'btn';
                btnRoma.innerHTML = '🗣️ 覚え読み音';
                
                const handler = (e) => { e.preventDefault(); playRomaVoice(currentData.roma); };
                btnRoma.addEventListener('touchstart', handler, { passive: false });
                btnRoma.addEventListener('click', handler);
                
                assistBox.appendChild(btnRoma);
            }
        }

        // ==========================================================================
        // 9. ボタンアクション
        // ==========================================================================
        const resetHandler = (e) => {
            e.preventDefault();
            if (answerZone.classList.contains('shatter')) return;
            const pieces = Array.from(answerZone.querySelectorAll('.piece'));
            pieces.forEach(p => poolZone.appendChild(p));
        };
        document.getElementById('btn-reset').addEventListener('touchstart', resetHandler, { passive: false });
        document.getElementById('btn-reset').addEventListener('click', resetHandler);

        const submitHandler = (e) => {
            e.preventDefault();
            if (answerZone.classList.contains('shatter')) return;
            initAudio();

            const currentData = shuffledStages[currentStageIdx];
            const answerPieces = Array.from(answerZone.querySelectorAll('.piece'));
            const userString = answerPieces.map(p => p.dataset.realChar).join('');

            if (userString === currentData.word) {
                playSound('success');
                setTimeout(() => {
                    currentStageIdx++;
                    if (currentStageIdx < shuffledStages.length) {
                        loadStage(currentStageIdx); 
                    } else {
                        showGameEnd(true); 
                    }
                }, 400);
            } else {
                playSound('fail');
                currentMissCount++;
                updateStatusHeaders();

                answerZone.classList.add('shatter-shake');
                
                setTimeout(() => {
                    answerZone.classList.remove('shatter-shake');
                    answerZone.classList.add('shatter');
                }, 350);

                setTimeout(() => {
                    answerPieces.forEach(p => poolZone.appendChild(p));
                    answerZone.classList.remove('shatter');
                    
                    if (currentMissCount >= 3) {
                        showGameEnd(false); 
                    } else {
                        updateAssistButtons(); 
                    }
                }, 950);
            }
        };
        document.getElementById('btn-submit').addEventListener('touchstart', submitHandler, { passive: false });
        document.getElementById('btn-submit').addEventListener('click', submitHandler);

        function showGameEnd(isClear) {
            endOverlay.classList.add('active');
            if (isClear) {
                overlayMsg.className = "overlay-title clear";
                overlayMsg.innerHTML = "You nailed it!<br>Perfect Job!<br>Awesome!";
                
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const hh = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                const timeStr = `${yyyy}-${mm}-${dd} ${hh}:${min}`;

                let fileName = "UnknownApp";
                try {
                    const path = decodeURIComponent(window.location.pathname);
                    const parts = path.split('/');
                    const lastPart = parts[parts.length - 1];
                    if (lastPart) {
                        fileName = lastPart.replace(/\.html$/i, '');
                    }
                } catch(e) {}

                overlaySub.innerHTML = `Cleared on: ${timeStr}<br>App ID: [${fileName}]`;
            } else {
                overlayMsg.className = "overlay-title gameover";
                overlayMsg.textContent = "GAME OVER";
                overlaySub.innerHTML = `諦めずに、もう一度挑戦してみましょう！`;
            }
        }

        const restartHandler = (e) => { e.preventDefault(); initGame(); };
        document.getElementById('btn-restart').addEventListener('touchstart', restartHandler, { passive: false });
        document.getElementById('btn-restart').addEventListener('click', restartHandler);

        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
